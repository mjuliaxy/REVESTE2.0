<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="left">
        <img src="../imgs/login/looky2k.avif" />
        <img src="../imgs/login/roupahomem.webp" />
        <img src="../imgs/login/slzimg.webp" />
    </div>

    <div class="right">
        <div class="login-box">
            <h2>Login</h2>

            <input type="text" placeholder="Usuário" id="email" />
            <input type="password" placeholder="Senha" id="senha" />

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Lembre-se de mim</label>
            </div>

            <button id="btn-entrar">Entrar</button>

            <p class="signup">
                Não tem uma conta?
                <a href="cadastro.html">Cadastre-se</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { RevesteService } from '../js/RevesteService.js';

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if (!email || !senha) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            const resultado = await RevesteService.login(email, senha);

            if (resultado.success) {
                alert('Login realizado com sucesso! Bem-vindo, ' + resultado.user.nome);
                window.location.href = 'vitrine.html';
            } else {
                alert('Erro: ' + (resultado.message || 'Credenciais inválidas'));
            }
        });
    </script>
</body>
</html>
